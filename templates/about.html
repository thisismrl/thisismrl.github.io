{% extends "base.html" %}
{% block title %}关于 / {{ site_settings.site_name }}{% endblock %}

{% block content %}
<article class="text-detail">
  <header class="text-header">
    <h1>关于</h1>
  </header>
  <div class="prose">
    {% if site_settings.about_text %}
      {{ site_settings.about_text|replace('\n', '<br>')|safe }}
    {% else %}
      <p>这里用于放置个人档案、摄影方向、写作方向与长期记录。</p>
      <p>你可以在本地后台的设置中编辑关于页面。</p>
    {% endif %}
  </div>
</article>
{% endblock %}
