<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ site_settings.site_name }}{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
  <header class="site-header">
    <a class="site-name" href="/">{{ site_settings.site_name }}</a>
    <nav class="site-nav" aria-label="Primary navigation">
      <a class="{% if request.path.startswith('/news') %}is-current{% endif %}" href="/news/" data-i18n data-zh="动态" data-en="News">动态</a>
      <a class="{% if request.path.startswith('/works') %}is-current{% endif %}" href="/works/" data-i18n data-zh="作品" data-en="Works">作品</a>
      <a class="{% if request.path.startswith('/texts') %}is-current{% endif %}" href="/texts/" data-i18n data-zh="文字" data-en="Texts">文字</a>
      <a class="{% if request.path.startswith('/archive') %}is-current{% endif %}" href="/archive/" data-i18n data-zh="时间线" data-en="Archive">时间线</a>
      <a class="{% if request.path.startswith('/about') %}is-current{% endif %}" href="/about/" data-i18n data-zh="关于" data-en="About">关于</a>
      <a class="{% if request.path.startswith('/contact') %}is-current{% endif %}" href="/contact/" data-i18n data-zh="联系" data-en="Contact">联系</a>
      <span class="language-switch">
        <button type="button" data-language="zh">中文</button>
        <span>/</span>
        <button type="button" data-language="en">English</button>
      </span>
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <span>{{ site_settings.site_name }}</span>
    <span>{{ current_year }}</span>
  </footer>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
