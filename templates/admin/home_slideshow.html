{% extends "admin/base.html" %}
{% block title %}首页轮播{% endblock %}

{% block content %}
<section class="admin-title">
  <h1>首页轮播</h1>
  <p>这里只显示已经加入首页轮播的照片。要添加新照片，请进入对应作品集，在照片下方勾选“加入首页轮播”。</p>
</section>

<form class="edit-form" method="post">
  <div class="slideshow-admin-grid">
    {% for photo in photos %}
      <label class="slideshow-item">
        <span class="slideshow-image">
          {% if photo.display_filename %}
            <img src="/uploads/display/{{ photo.display_filename }}" alt="{{ photo.title or photo.filename }}">
          {% endif %}
        </span>
        <span class="slideshow-fields">
          <span class="checkbox">
            <input type="checkbox" name="selected_photo" value="{{ photo.id }}" checked>
            保留在首页轮播
          </span>
          <span>{{ photo.title or photo.filename }}</span>
          <small>{{ photo.collection_title }}{% if photo.shot_date %} / {{ photo.shot_date }}{% endif %}</small>
          <span>轮播顺序
            <input type="number" name="featured_order_{{ photo.id }}" value="{{ photo.featured_order or photo.sort_order or 0 }}">
          </span>
        </span>
      </label>
    {% else %}
      <p class="empty">还没有首页轮播照片。请先进入作品集，在想展示的照片下方勾选“加入首页轮播”。</p>
    {% endfor %}
  </div>

  <div class="form-actions">
    <button type="submit">保存首页轮播</button>
    <a href="/admin/">返回概览</a>
  </div>
</form>
{% endblock %}
