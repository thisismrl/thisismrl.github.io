<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}后台{% endblock %} / {{ site_settings.site_name }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>
  <header class="admin-header">
    <a href="/admin/">后台</a>
    <nav>
      <a href="/admin/collections">作品集</a>
      <a href="/admin/home-slideshow">首页轮播</a>
      <a href="/admin/articles">文字</a>
      <a href="/admin/settings">设置</a>
      <a href="/admin/export">生成静态站</a>
      <a href="/" target="_blank">查看网站</a>
      <a href="/admin/logout">退出</a>
    </nav>
  </header>

  <main class="admin-main">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="messages">
          {% for category, message in messages %}
            <p class="{{ category }}">{{ message }}</p>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
  <script src="{{ url_for('static', filename='js/admin.js') }}"></script>
</body>
</html>
