    <h1>Note 2025-11-14</h1>
    <p class="muted">Notes / 2025-11-14</p>

  </header>
  <div class="prose">
    <p>看着你微闭的双眼，我感到那一刻的永恒。你均匀的呼吸声，静谧的夜，窗外都市灯火阑珊。我想起镰仓午后湛蓝的海，想起群山怀抱里仰望星河的人，想起樱花树，想起一卷失落在异国的胶片。亲爱的，你睡着的样子，让我无比爱这个世界。</p>
