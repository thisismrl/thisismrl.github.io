    <h1>林中湖</h1>
    <p class="muted">Poem / 2026-06-04</p>

  </header>
  <div class="prose">
    <p>风间生长
一片夜的森林
时间是不确定
少女歌声轻</p>
<p>山湖不动声色
静默成一块暗夜琉璃
并期待一场
永恒的完美降临</p>
<p>圣栎树上的精灵
请记得提醒
美丽的少女
一定不要靠近湖心</p>
  </div>
